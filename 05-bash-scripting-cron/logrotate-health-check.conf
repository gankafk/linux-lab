# Config de logrotate para el log del health-check.
# Despliegue: copiar a /etc/logrotate.d/health-check
#   sudo cp logrotate-health-check.conf /etc/logrotate.d/health-check
#   (logrotate se ejecuta solo a diario; probar con: sudo logrotate -d /etc/logrotate.d/health-check)

/var/log/health-check.log {
    su root root        # rotar como root:root (necesario: /var/log es group-writable por syslog)
    daily               # rota cada día
    rotate 7            # conserva 7 copias (una semana) y borra las más viejas
    compress            # comprime (gzip) las rotadas
    delaycompress       # no comprime la más reciente hasta la siguiente vuelta
    missingok           # si el log no existe, no da error
    notifempty          # no rota si está vacío
    create 0640 root root   # tras rotar, crea el log nuevo con estos permisos/dueño
}
