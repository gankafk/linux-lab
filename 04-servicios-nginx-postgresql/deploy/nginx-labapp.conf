server {
    listen 80;
    server_name _;

    # Estáticos servidos directamente por Nginx (rápido, sin pasar por la app)
    location /static/ {
        alias /opt/labapp/static/;
    }

    # El resto → reverse proxy a gunicorn
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# Despliegue:
#   sudo cp nginx-labapp.conf /etc/nginx/sites-available/labapp
#   sudo ln -s /etc/nginx/sites-available/labapp /etc/nginx/sites-enabled/
#   sudo rm /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx
#
# Para que Nginx (www-data) pueda leer los estáticos de /opt/labapp (750, dueño labapp):
#   sudo usermod -aG labapp www-data
#   sudo systemctl restart nginx
